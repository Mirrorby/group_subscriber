name: Join Telegram Groups

on:
  workflow_dispatch:       # ручной запуск через кнопку Actions
  schedule:
    - cron: '0 9 * * *'   # автозапуск каждый день в 09:00 UTC (при желании)

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Restore credentials.json from secret
        run: echo "$CREDENTIALS_JSON" > credentials.json
        env:
          CREDENTIALS_JSON: ${{ secrets.CREDENTIALS_JSON }}

      - name: Debug secrets
        run: |
          if [ -z "${{ secrets.TG_SESSION }}" ]; then
            echo "❌ TG_SESSION is EMPTY or NOT SET"
          else
            echo "✅ TG_SESSION is set (length: ${#TG_SESSION})"
          fi
        env:
          TG_SESSION: ${{ secrets.TG_SESSION }}

      - name: Run script
        env:
          TG_SESSION: ${{ secrets.TG_SESSION }}
        run: python join_groups.py
