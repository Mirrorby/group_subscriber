name: Join Telegram Groups

on:
  workflow_dispatch:       # ручной запуск через кнопку Actions
  schedule:
    - cron: '0 9 * * *'   # автозапуск каждый день в 09:00 UTC (при желании)

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 60  # максимум 1 час, потом job убивается

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Restore credentials.json from secret
        run: |
          if [ -z "$CREDENTIALS_JSON" ]; then
            echo "❌ CREDENTIALS_JSON secret is EMPTY"
            exit 1
          fi
          echo "✅ CREDENTIALS_JSON length: ${#CREDENTIALS_JSON}"
          echo "$CREDENTIALS_JSON" | base64 -d > credentials.json
          echo "📄 credentials.json size: $(wc -c < credentials.json) bytes"
          head -c 20 credentials.json
        env:
          CREDENTIALS_JSON: ${{ secrets.CREDENTIALS_JSON }}

      - name: Debug secrets
        run: |
          if [ -z "${{ secrets.TG_SESSION }}" ]; then
            echo "❌ TG_SESSION is EMPTY or NOT SET"
          else
            echo "✅ TG_SESSION is set (length: ${#TG_SESSION})"
          fi
        env:
          TG_SESSION: ${{ secrets.TG_SESSION }}

      - name: Run script
        env:
          TG_SESSION: ${{ secrets.TG_SESSION }}
        run: python -u join_groups.py
